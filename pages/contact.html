<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Lanthe</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <header>
        <nav>
            <h2>Lanthe</h2>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="../index.html#links">Links</a></li>
                <li><a href="../index.html#projects">Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Contact Section -->
    <section id="content-page">
        <h1>Get In Touch</h1>
        <p class="page-intro">Have a question, collaboration idea, or just want to say hi? Feel free to reach out!</p>
        
        <div class="contact-container-single">
            <!-- Contact Form -->
            <div class="contact-form-wrapper">
                <h3>Send Me a Message</h3>
                <form id="contactForm" class="contact-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required placeholder="Your name">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="your.email@example.com">
                    </div>
                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" required placeholder="What's this about?">
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" required rows="6" placeholder="Your message here..."></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send Message</button>
                    <div id="formStatus" class="form-status"></div>
                </form>
                
                <div class="response-time">
                    <p>⏱️ I usually respond within 24-48 hours</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 Lanthe. All rights reserved. | <a href="terms.html" style="color: var(--accent-purple);">Terms & Copyright</a></p>
    </footer>
    
    <script src="../js/script.js"></script>
</body>
</html>
